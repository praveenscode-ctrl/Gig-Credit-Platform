name: gigcredit
description: Privacy-First Credit Scoring for Gig Workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^13.0.0
  
  # UI/Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  fl_chart: ^1.2.0           # For pillar bar charts
  animated_text_kit: ^4.2.2   # Typewriter text effect
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  
  # Network
  http: ^1.1.0
  
  # Crypto (HMAC)
  crypto: ^3.0.7
  
  # File Handling
  image_picker: ^1.0.4        # Camera + gallery
  file_picker: ^8.0.0         # PDF picker
  path_provider: ^2.1.1
  
  # PDF Generation
  pdf: ^3.12.0
  printing: ^5.14.3

  
  # Utils
  intl: ^0.19.0               # Date/number formatting
  uuid: ^4.2.0                # Unique identifiers
  
  # Icons
  cupertino_icons: ^1.0.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  google_mlkit_text_recognition: ^0.15.1
  mobile_scanner: ^7.2.0
  paddle_ocr_flutter: ^0.0.3
  syncfusion_flutter_pdf: ^33.2.4
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/config/
    - assets/images/
    - assets/ocr/expected_outputs.json
    - assets/ocr/fallback_contracts.json
    - assets/constants/
